{% load static %}

<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'vendor/css/app.css' %}" rel="stylesheet">
</head>

<body>
    <div class="app-shell">
        <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
            <div class="container-fluid page-shell">
                <a class="navbar-brand app-brand" href="{% url 'rooms:index' %}">
                    <span class="app-brand__mark">B</span>
                    <span>Booked!</span>
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                    aria-controls="mainNav" aria-expanded="false" aria-label="Открыть навигацию">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="mainNav">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" href="{% url 'rooms:index' %}">Поиск</a>
                        </li>
                        <li class="nav-item">
                            <!-- Будущий backend-маршрут списка переговорных. -->
                            <a class="nav-link disabled" href="#" tabindex="-1" aria-disabled="true">Переговорные</a>
                        </li>
                        <li class="nav-item">
                            <!-- Будущий backend-маршрут личных бронирований. -->
                            <a class="nav-link disabled" href="#" tabindex="-1" aria-disabled="true">Мои
                                бронирования</a>
                        </li>
                    </ul>

                    <div class="d-flex align-items-lg-center gap-2 flex-column flex-lg-row">
                        <a class="btn btn-outline-light btn-sm" href="{% url 'accounts:login' %}">Войти</a>
                        <a class="btn btn-primary btn-sm" href="{% url 'accounts:register' %}">Регистрация</a>
                    </div>
                </div>
            </div>
        </nav>

        {% block main %} {% endblock %}

        <footer class="app-footer">
            <div class="page-shell app-footer__inner">
                <span>Booked! - учебный сервис бронирования переговорных</span>
                <span class="app-footer__meta">IVIsion</span>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
