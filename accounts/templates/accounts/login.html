{% extends 'accounts/base.html' %}
{% load static %}

{% block main %}
<main class="app-main">
    <div class="page-shell">
        <section class="auth-layout">
            <div class="auth-heading">
                <p class="eyebrow">Аккаунт</p>
                <h1 class="page-title">Войти</h1>
                <p class="page-subtitle">Авторизуйтесь, чтобы перейти к бронированию переговорных.</p>
            </div>

            <div class="card auth-card">
                <div class="card-body">
                    <form action="{% url 'accounts:login' %}" method="post" class="auth-form" novalidate>
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label" for="{{ form.username.id_for_label }}">Имя пользователя</label>
                            {{ form.username }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="{{ form.password.id_for_label }}">Пароль</label>
                            {{ form.password }}
                        </div>

                        <button class="btn btn-primary w-100" type="submit">Войти</button>
                    </form>
                </div>
                <div class="card-footer auth-card__footer">
                    <span>Нет аккаунта?</span>
                    <a href="{% url 'accounts:register' %}">Зарегистрироваться</a>
                </div>
            </div>
        </section>
    </div>
</main>
{% endblock %}
