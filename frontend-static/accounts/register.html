<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Регистрация - Booked!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../vendor/css/app.css" rel="stylesheet">
</head>

<body>
    <div class="app-shell">
        <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
            <div class="container-fluid page-shell">
                <a class="navbar-brand app-brand" href="../index.html">
                    <span class="app-brand__mark">B</span>
                    <span>Booked!</span>
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                    aria-controls="mainNav" aria-expanded="false" aria-label="Открыть навигацию">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="mainNav">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" href="../index.html">Поиск</a>
                        </li>
                        <li class="nav-item">
                            <!-- Будущий backend-маршрут списка переговорных. -->
                            <a class="nav-link disabled" href="#" tabindex="-1" aria-disabled="true">Переговорные</a>
                        </li>
                        <li class="nav-item">
                            <!-- Будущий backend-маршрут личных бронирований. -->
                            <a class="nav-link disabled" href="#" tabindex="-1" aria-disabled="true">Мои
                                бронирования</a>
                        </li>
                    </ul>

                    <div class="d-flex align-items-lg-center gap-2 flex-column flex-lg-row">
                        <a class="btn btn-outline-light btn-sm" href="login.html">Войти</a>
                        <a class="btn btn-primary btn-sm" href="register.html">Регистрация</a>
                    </div>
                </div>
            </div>
        </nav>

        <main class="app-main">
            <div class="page-shell">
                <section class="auth-layout">
                    <div class="auth-heading">
                        <p class="eyebrow">Новый пользователь</p>
                        <h1 class="page-title">Регистрация</h1>
                        <p class="page-subtitle">Создайте аккаунт для будущего управления своими бронированиями.</p>
                    </div>

                    <div class="card auth-card">
                        <div class="card-body">
                            <form class="auth-form" novalidate>
                                <div class="mb-3">
                                    <label class="form-label" for="id_username">Имя пользователя</label>
                                    <input class="form-control" type="text" name="username" id="id_username"
                                        placeholder="Введите имя пользователя">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" for="id_email">Email</label>
                                    <input class="form-control" type="email" name="email" id="id_email"
                                        placeholder="name@example.com">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" for="id_password1">Пароль</label>
                                    <input class="form-control" type="password" name="password1" id="id_password1"
                                        placeholder="Придумайте пароль">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" for="id_password2">Подтверждение пароля</label>
                                    <input class="form-control" type="password" name="password2" id="id_password2"
                                        placeholder="Повторите пароль">
                                </div>

                                <button class="btn btn-primary w-100" type="submit">Зарегистрироваться</button>
                            </form>
                        </div>
                        <div class="card-footer auth-card__footer">
                            <span>Уже есть аккаунт?</span>
                            <a href="login.html">Войти</a>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <footer class="app-footer">
            <div class="page-shell app-footer__inner">
                <span>Booked! - учебный сервис бронирования переговорных</span>
                <span class="app-footer__meta">IVIsion</span>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
